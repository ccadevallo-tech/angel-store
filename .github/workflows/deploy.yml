name: Deploy
on:
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          
      - run: pnpm install --no-frozen-lockfile
      
      # On lance le build global
      - run: pnpm build 

      - name: Deploy Everything
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: . # On déploie TOUT le projet pour voir ce qui s'y passe
          branch: gh-pages
