name: Deploy
on:
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm build 

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          # On cible le dossier spécifique de l'app web
          folder: apps/web/dist 
          branch: gh-pages
