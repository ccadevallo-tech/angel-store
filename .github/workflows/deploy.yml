name: Deploy
on:
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --no-frozen-lockfile
      
      # On lance le build global
      - run: npm run build 

      # CETTE ÉTAPE VA NOUS DIRE OÙ EST LE SITE
      - name: Check where the files are
        run: find . -maxdepth 3 -name "index.html"

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          # On essaie de cibler la racine au cas où
          folder: . 
          branch: gh-pages

