name: Deploy
on:
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm build

      # Cette étape force le déplacement du site construit vers un dossier simple
      - name: Prepare Content
        run: cp -r apps/web/dist ./public_site

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: public_site # On déploie le dossier qu'on vient de créer
          branch: gh-pages
