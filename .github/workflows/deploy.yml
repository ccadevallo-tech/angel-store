name: Deploy
on:
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          
      - run: pnpm install --no-frozen-lockfile
      
      # On force le build spécifiquement pour l'app web
      - run: pnpm build

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          # On cible le dossier exact que tu as montré dans tes erreurs précédentes
          folder: apps/web/dist 
          branch: gh-pages
          clean: true
