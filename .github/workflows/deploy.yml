name: Deploy
on:
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm build

      # Ce bloc cherche ton site et le prépare proprement
      - name: Locate and Prepare
        run: |
          # Trouve le dossier qui contient l'index.html construit (exclut node_modules)
          SITE_PATH=$(find . -name "index.html" -not -path "*/node_modules/*" -exec dirname {} \; | head -n 1)
          echo "Site trouvé dans : $SITE_PATH"
          mkdir -p final_deploy
          cp -r $SITE_PATH/. ./final_deploy/

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: final_deploy
          branch: gh-pages
