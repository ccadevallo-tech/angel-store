kind = "web"
previewPath = "/"
title = "Angel Store"
version = "1.0.0"
id = "artifacts/angel-store"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25788

[services.development]
run = "pnpm --filter @workspace/angel-store run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/angel-store", "run", "build" ]
publicDir = "artifacts/angel-store/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25788"
BASE_PATH = "/"
